services:
  postgres:
    image: postgres:16-alpine
    container_name: hoodscan-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: hoodscan
      POSTGRES_PASSWORD: hoodscan
      POSTGRES_DB: hoodscan
    ports:
      - "5432:5432"
    volumes:
      - hoodscan_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: hoodscan-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - hoodscan_redis_data:/data

volumes:
  hoodscan_postgres_data:
  hoodscan_redis_data:
